kind = "web"
previewPath = "/"
title = "WanderIndia"
version = "1.0.0"
id = "artifacts/wander-india"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24932

[services.development]
run = "pnpm --filter @workspace/wander-india run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/wander-india", "run", "build" ]
publicDir = "artifacts/wander-india/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24932"
BASE_PATH = "/"
